<!DOCTYPE html>
<html lang="en">
<head>
    <title>Event Management Login</title>
    <link rel="stylesheet" href="index.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Manrope:wght@600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <button onclick="window.location.href='landing.html'" class="home-btn" style="position:fixed; top:16px; left:16px; padding:10px 14px; border-radius:8px; border:none; background:#0f6fff; color:#fff; font-weight:600; cursor:pointer; box-shadow:0 10px 24px rgba(15,111,255,0.18); z-index:99;">
        <i class="fa-solid fa-house"></i> Home
    </button>
    <div class="pagecon">
        <div class="main-content">
            <div class="header-section">
                <img class="user-image" src="../src/assets/images/LOGO.png" alt="Logo"/>
                <h1>Sports Day '26</h1>
                <p>College Sports Day Registration portal</p>
            </div>

            <div class="form-container">
                <div class="tab-container">
                    <button class="tab-btn" onclick="window.location.href='dep_eve_login.html'">Department Login</button>
                    <button class="tab-btn active">Event Management Login</button>
                </div>

                <form id="loginForm" onsubmit="handleLogin(event)">
                    <div class="form-group">
                        <label>Manager ID</label>
                        <div class="input-group">
                            <i class="fa-solid fa-user-tie"></i>
                            <input type="text" id="managerId" placeholder="e.g. MGR-001" required/>
                        </div>
                    </div>

                    <div class="form-group">
                        <div class="label-row">
                            <label>Password</label>
                            <a href="#" class="forgot-link">Forgot Password?</a>
                        </div>
                        <div class="input-group">
                            <i class="fa-solid fa-lock"></i>
                            <input type="password" id="password" placeholder="••••••••" required/> 
                            <i class="fa-solid fa-eye-slash toggle-password" onclick="togglePassword()"></i>
                        </div>
                    </div>

                    <div class="checkbox-group">
                        <input type="checkbox" id="terms" required>
                        <label for="terms">Accepting the Terms and conditions</label>
                    </div>

                    <button type="submit" class="login-btn">Sign In</button>
                </form>
            </div>
        </div>
    </div>

    <script src="api.js"></script>
    <script>
        async function handleLogin(event) {
            event.preventDefault();
            const username = document.getElementById('managerId').value;
            const password = document.getElementById('password').value;

            try {
                const response = await AuthAPI.login(username, password);
                if (response.success) {
                    const role = response.user.role;
                    if (role === 'admin') {
                        window.location.href = 'admin/dashboard.html';
                    } else if (role === 'event') {
                        window.location.href = 'Event_Manager_Dashboard.html';
                    } else if (role === 'dept') {
                        window.location.href = 'admin/deptcenter.html';
                    } else {
                        alert("Login successful but role unknown.");
                    }
                } else {
                    alert(response.message || "Invalid credentials");
                }
            } catch (err) {
                console.error("API login failed:", err);
                alert("Login failed: " + err.message);
            }
        }

        // Attach event listener
        document.getElementById('loginForm').onsubmit = handleLogin;

        function togglePassword() {
            const passwordInput = document.getElementById('password');
            const icon = document.querySelector('.toggle-password');
            
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                icon.classList.remove('fa-eye-slash');
                icon.classList.add('fa-eye');
            } else {
                passwordInput.type = 'password';
                icon.classList.remove('fa-eye');
                icon.classList.add('fa-eye-slash');
            }
        }
    </script>
</body>
</html>
